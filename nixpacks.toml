[variables]
NIXPACKS_NODE_VERSION = "22.13.1"
NPM_CONFIG_PRODUCTION = "false"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["cd apps/web && npm ci --include=dev"]

[phases.build]
cmds = ["cd apps/web && npm run build"]

[start]
cmd = "cd apps/web && npm run preview -- --host 0.0.0.0 --port $PORT"
