<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f8f9fa; /* surface */

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container flex flex-col min-h-screen">
<!-- Mobile Container Wrapper -->
<main class="w-full max-w-[600px] mx-auto bg-surface min-h-screen relative flex flex-col shadow-2xl overflow-hidden pb-[100px]">
<!-- Header: Custom Detail Header (Suppressed main nav, specialized back action) -->
<header class="flex justify-between items-center w-full px-container-padding h-14 z-10 absolute top-0 left-0 bg-gradient-to-b from-black/50 to-transparent">
<button aria-label="Go Back" class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-surface/20 backdrop-blur-md text-on-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
</header>
<!-- Hero Illustration Area -->
<section class="relative w-full aspect-square md:aspect-video rounded-b-xl overflow-hidden shadow-[0px_4px_20px_0px_rgba(0,0,0,0.06)] bg-surface-variant flex items-center justify-center">
<img alt="Reaction Time Game Illustration" class="w-full h-full object-cover" data-alt="A vibrant, abstract digital illustration representing speed and reaction. Bright neon green and primary purple geometric shapes blur across a dark background, suggesting rapid motion. The style is modern, energetic, and clean, fitting a casual mobile game aesthetic. Lighting is bright and intense, focusing on the central burst of colors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDF42PmUSviMUZ1j9v9zBtvsdQZppBoQBAdlDq7J2kJ_GkJS4SkJItJjoJ-H6053JI8yjxb5dVBxjmGURh8OVObgGrZUgAbeLz6RLoQd_9o-_TWeHKctNoAtq3HEZGKQNO3iSHRNlc6I60pQNHFFr9Fs3oAHGPGas2VUV-LO0VgmjAEnqJk6WB7fRpNGnVG-JjUx2xHad77PQ2GoaO5jys9oZNoyIRujRagZkTAw-4BF86VXgOzOaQBd_lJjO2segQNeOzSHYWIuMsP"/>
<!-- Floating Reward Badge overlaid on image -->
<div class="absolute bottom-4 right-4 bg-secondary-container text-on-secondary-container px-sm py-xs rounded-full flex items-center gap-xs shadow-md border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-[16px] text-secondary">monetization_on</span>
<span class="font-label-lg text-label-lg">50 Coins</span>
</div>
</section>
<!-- Content Area -->
<section class="px-container-padding pt-lg flex flex-col gap-md flex-grow">
<!-- Title & Description -->
<div class="flex flex-col gap-xs">
<h1 class="font-display-lg text-display-lg text-primary">Reaction Time</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Tap as fast as possible when the signal appears.</p>
</div>
<!-- Rules Bento Box -->
<div class="bg-surface-container-lowest rounded-lg p-md shadow-[0px_4px_20px_0px_rgba(0,0,0,0.06)] mt-sm border border-outline-variant/30 relative overflow-hidden">
<div class="absolute -right-4 -top-4 w-24 h-24 bg-primary-container/20 rounded-full blur-2xl"></div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">menu_book</span>
                    Simple Rules
                </h2>
<ul class="flex flex-col gap-sm">
<li class="flex items-start gap-sm bg-surface-container-low p-sm rounded-DEFAULT">
<div class="w-6 h-6 rounded-full bg-error-container text-on-error-container flex items-center justify-center font-label-lg text-label-lg flex-shrink-0 mt-0.5">1</div>
<span class="font-body-md text-body-md text-on-surface-variant">Wait for the screen to turn bright green.</span>
</li>
<li class="flex items-start gap-sm bg-surface-container-low p-sm rounded-DEFAULT">
<div class="w-6 h-6 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-lg text-label-lg flex-shrink-0 mt-0.5">2</div>
<span class="font-body-md text-body-md text-on-surface-variant">Tap the screen as fast as humanly possible.</span>
</li>
<li class="flex items-start gap-sm bg-surface-container-low p-sm rounded-DEFAULT">
<div class="w-6 h-6 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-label-lg text-label-lg flex-shrink-0 mt-0.5">3</div>
<span class="font-body-md text-body-md text-on-surface-variant">Beat your high score to earn maximum coins!</span>
</li>
</ul>
</div>
</section>

<div class="fixed bottom-0 w-full max-w-[600px] bg-gradient-to-t from-surface via-surface to-transparent pt-lg pb-container-padding px-container-padding z-50">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-headline-md text-headline-md flex items-center justify-center gap-sm active:scale-95 transition-all duration-200 shadow-[0_4px_0_0_#4a00a3] hover:brightness-110">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
