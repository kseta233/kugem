<!-- Custom Progress Bar (12px height, fully rounded as per guidance) -->
<div class="w-64 h-[12px] bg-surface-variant rounded-full overflow-hidden mt-xl opacity-0 transition-opacity duration-500 delay-300" id="progress-container">
<div class="h-full bg-gradient-to-r from-tertiary-container to-primary rounded-full w-0 transition-all duration-[2000ms] ease-out shadow-[inset_0_-2px_4px_rgba(0,0,0,0.1)]" id="progress-bar"></div>

<script>
        // Simple entrance animation and progress bar simulation
        document.addEventListener("DOMContentLoaded", () => {
            const logo = document.getElementById('logo-container');
            const text = document.getElementById('text-container');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');

            // Initial state classes for animation (if not handled by inline CSS)
            logo.classList.add('scale-90', 'opacity-0');
            
            // Trigger entrance animations
            setTimeout(() => {
                logo.classList.remove('scale-90', 'opacity-0');
                logo.classList.add('scale-100', 'opacity-100');
            }, 100);

            setTimeout(() => {
                text.classList.remove('opacity-0');
                progressContainer.classList.remove('opacity-0');
            }, 400);

            // Animate progress bar
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 800);

            // Optional: simulate redirect after load
            setTimeout(() => {
                // In a real app, this would route to the Home screen
                progressBar.classList.add('opacity-0');
            }, 3000);
        });
    </script>
